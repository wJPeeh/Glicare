<!DOCTYPE html>

<html class="light" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Glicare - Dashboard</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-tint": "#005f9c",
              "on-primary": "#ecf3ff",
              "background": "#f5f7f9",
              "surface-bright": "#f5f7f9",
              "tertiary-dim": "#714600",
              "on-secondary-fixed-variant": "#00675f",
              "primary": "#005f9c",
              "secondary-container": "#78f7e9",
              "on-background": "#2c2f31",
              "secondary-dim": "#005a53",
              "on-primary-container": "#002e50",
              "outline-variant": "#abadaf",
              "surface-container-highest": "#d9dde0",
              "secondary": "#00675f",
              "on-primary-fixed-variant": "#00375e",
              "primary-fixed-dim": "#4ea3f1",
              "primary-container": "#5eb0ff",
              "on-surface": "#2c2f31",
              "tertiary-fixed-dim": "#e79400",
              "on-error": "#ffefee",
              "on-error-container": "#570008",
              "on-tertiary-container": "#4a2c00",
              "surface": "#f5f7f9",
              "error-container": "#fb5151",
              "on-secondary-fixed": "#004842",
              "inverse-primary": "#5eb0ff",
              "on-tertiary-fixed-variant": "#563400",
              "outline": "#747779",
              "on-secondary": "#bffff6",
              "surface-variant": "#d9dde0",
              "secondary-fixed-dim": "#69e8db",
              "secondary-fixed": "#78f7e9",
              "inverse-on-surface": "#9a9d9f",
              "surface-dim": "#d0d5d8",
              "error-dim": "#9f0519",
              "inverse-surface": "#0b0f10",
              "on-primary-fixed": "#001123",
              "on-surface-variant": "#595c5e",
              "on-tertiary": "#fff0e3",
              "primary-fixed": "#5eb0ff",
              "tertiary": "#815100",
              "on-secondary-container": "#005c55",
              "surface-container-low": "#eef1f3",
              "tertiary-container": "#f8a010",
              "surface-container": "#e5e9eb",
              "on-tertiary-fixed": "#2a1700",
              "error": "#b31b25",
              "tertiary-fixed": "#f8a010",
              "primary-dim": "#005389",
              "surface-container-lowest": "#ffffff",
              "surface-container-high": "#dfe3e6"
            },
            fontFamily: {
              "headline": ["Plus Jakarta Sans"],
              "body": ["Manrope"],
              "label": ["Manrope"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        body { font-family: 'Manrope', sans-serif; }
        h1, h2, h3 { font-family: 'Plus Jakarta Sans', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glucose-card-shadow {
            box-shadow: 0 20px 48px -12px rgba(0, 95, 156, 0.12);
        }
        .action-card-shadow {
            box-shadow: 0 8px 24px -6px rgba(0, 0, 0, 0.04);
        }
        .smooth-path {
            stroke-dasharray: 1000;
            stroke-dashoffset: 0;
        }
    </style>
</head>
<body class="bg-background text-on-surface pb-32">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-white/90 dark:bg-slate-900/90 backdrop-blur-xl flex justify-between items-center px-6 h-20">
<div class="flex items-center gap-3">
<div class="w-12 h-12 rounded-full p-0.5 bg-gradient-to-tr from-primary to-secondary">
<div class="w-full h-full rounded-full overflow-hidden border-2 border-white">
<img alt="User profile photo" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDXVgb9CfabH0EdBpO4xC0pOXs_ApEDDr4owmpRiT1Jd_k2IpaG05tC3gX1RF2mpiaoC1u-cbJI8ZNRqpns5g0L-KFd11EXI4DD8yVVB9bUqsQ_KsNReZ4j0QXZAtc9sHOWrMs-YeDnxZNS6q7yOX_1A0aPNH1Q252J23tTinjI5AS6iFl4VXVFtmEvKKNqkM9OIBxA7YxyI0lo2005aTGZX74Q8n0cs04e4vxRg_aBvH3gNH1qmYBi-yGz-jsLhxm5zY9XSPC3tdo"/>
</div>
</div>
<div>
<p class="text-[10px] font-bold text-on-surface-variant uppercase tracking-[0.15em] opacity-60">Olá,</p>
<h1 class="font-headline font-extrabold text-xl tracking-tight text-primary">Lilian</h1>
</div>
</div>
<button class="w-11 h-11 flex items-center justify-center rounded-2xl bg-surface-container-low text-primary hover:bg-surface-container transition-colors active:scale-95">
<span class="material-symbols-outlined text-[26px]">notifications</span>
</button>
</header>
<main class="px-6 pt-24 space-y-8">
<!-- Primary Glucose Card -->
<section class="relative group">
<div class="absolute -inset-0.5 bg-gradient-to-br from-primary/10 to-secondary/10 rounded-[2.5rem] blur-xl opacity-50 group-hover:opacity-100 transition duration-1000"></div>
<div class="relative bg-white rounded-[2.5rem] p-8 glucose-card-shadow border border-white overflow-hidden">
<div class="flex justify-between items-start mb-8">
<div>
<span class="font-label text-[11px] font-bold text-on-surface-variant uppercase tracking-[0.2em] mb-2 block opacity-70">Glicemia Atual</span>
<div class="flex items-baseline gap-2">
<span class="font-headline font-black text-6xl text-primary tracking-tighter">112</span>
<span class="font-body text-xl font-bold text-on-surface-variant/60">mg/dL</span>
</div>
</div>
<div class="px-5 py-2.5 bg-secondary-container/50 text-on-secondary-container rounded-2xl flex items-center gap-2 border border-secondary-container">
<div class="w-2.5 h-2.5 rounded-full bg-secondary animate-pulse shadow-[0_0_8px_rgba(0,103,95,0.4)]"></div>
<span class="font-label text-xs font-black uppercase tracking-widest">Normal</span>
</div>
</div>
<div class="flex items-center gap-4 py-4 px-6 bg-surface-container-low/50 rounded-2xl border border-white">
<div class="w-10 h-10 rounded-xl bg-white flex items-center justify-center shadow-sm text-primary">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">schedule</span>
</div>
<div>
<span class="font-body text-[13px] font-bold text-on-surface block leading-none">08:15</span>
<span class="font-body text-[11px] font-medium text-on-surface-variant uppercase tracking-wider">Última medida: Jejum</span>
</div>
</div>
<!-- Abstract background graphics -->
<div class="absolute -right-12 -bottom-12 w-48 h-48 bg-primary/5 rounded-full blur-3xl"></div>
<div class="absolute -left-12 -top-12 w-32 h-32 bg-secondary/5 rounded-full blur-2xl"></div>
</div>
</section>
<!-- AI Prediction Chart Section -->
<section class="space-y-5">
<div class="flex justify-between items-center">
<div>
<h2 class="font-headline font-extrabold text-xl text-on-surface tracking-tight">IA Ativa</h2>
<p class="font-body text-xs font-semibold text-on-surface-variant/70">Previsão baseada no seu histórico</p>
</div>
<div class="w-10 h-10 bg-primary/10 rounded-xl flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-xl">auto_awesome</span>
</div>
</div>
<div class="bg-white rounded-[2.5rem] p-6 glucose-card-shadow border border-white relative">
<div class="relative h-44 flex items-end justify-between px-4">
<!-- SVG Chart Overlay for Smooth Curves -->
<svg class="absolute inset-0 w-full h-full pointer-events-none" preserveaspectratio="none" viewbox="0 0 100 100">
<path class="smooth-path opacity-40" d="M 12.5 65 C 25 55, 25 35, 37.5 45 C 50 55, 50 65, 62.5 65 C 75 65, 75 75, 87.5 75" fill="none" stroke="url(#gradient)" stroke-linecap="round" stroke-width="3"></path>
<defs>
<lineargradient id="gradient" x1="0%" x2="100%" y1="0%" y2="0%">
<stop offset="0%" stop-color="#005f9c"></stop>
<stop offset="100%" stop-color="#00675f"></stop>
</lineargradient>
</defs>
</svg>
<!-- Data Point 1 -->
<div class="flex-1 flex flex-col items-center z-10">
<span class="text-[11px] font-extrabold text-on-surface-variant mb-3">116</span>
<div class="w-3 h-3 rounded-full bg-white border-2 border-primary/40 shadow-sm mb-2"></div>
<span class="text-[10px] font-bold text-outline/60 uppercase tracking-tighter">Agora</span>
</div>
<!-- Data Point 2 -->
<div class="flex-1 flex flex-col items-center z-10">
<span class="text-[11px] font-extrabold text-primary mb-3">125</span>
<div class="w-4 h-4 rounded-full bg-primary shadow-lg shadow-primary/30 mb-2 border-2 border-white"></div>
<span class="text-[10px] font-bold text-primary uppercase tracking-tighter">10h</span>
</div>
<!-- Data Point 3 -->
<div class="flex-1 flex flex-col items-center z-10">
<span class="text-[11px] font-extrabold text-on-surface-variant mb-3">110</span>
<div class="w-3 h-3 rounded-full bg-white border-2 border-primary/40 shadow-sm mb-2"></div>
<span class="text-[10px] font-bold text-outline/60 uppercase tracking-tighter">12h</span>
</div>
<!-- Data Point 4 -->
<div class="flex-1 flex flex-col items-center z-10">
<span class="text-[11px] font-extrabold text-on-surface-variant mb-3">105</span>
<div class="w-3 h-3 rounded-full bg-white border-2 border-primary/40 shadow-sm mb-2"></div>
<span class="text-[10px] font-bold text-outline/60 uppercase tracking-tighter">14h</span>
</div>
</div>
<button class="w-full mt-8 py-4.5 px-6 bg-surface-container-low rounded-2xl flex items-center justify-center gap-3 hover:bg-surface-container transition-all active:scale-[0.98] border border-white">
<span class="font-body text-sm font-extrabold text-primary">Ver histórico completo</span>
<span class="material-symbols-outlined text-[18px] text-primary">arrow_forward</span>
</button>
</div>
</section>
<!-- Quick Actions Grid -->
<section class="space-y-5">
<h2 class="font-headline font-extrabold text-xl text-on-surface tracking-tight">Ações rápidas</h2>
<div class="grid grid-cols-2 gap-4">
<!-- Action 1: Glicemia -->
<button class="flex flex-col items-start p-6 bg-white rounded-[2.5rem] action-card-shadow border border-white active:scale-[0.97] transition-all group">
<div class="w-14 h-14 rounded-2xl bg-primary/10 flex items-center justify-center mb-5 group-hover:bg-primary group-hover:text-white transition-colors duration-300">
<span class="material-symbols-outlined text-primary group-hover:text-white text-3xl" style="font-variation-settings: 'FILL' 1;">bloodtype</span>
</div>
<span class="font-body text-sm font-extrabold text-on-surface text-left leading-tight">Registrar<br/>Glicemia</span>
</button>
<!-- Action 2: Alimentação -->
<button class="flex flex-col items-start p-6 bg-white rounded-[2.5rem] action-card-shadow border border-white active:scale-[0.97] transition-all group">
<div class="w-14 h-14 rounded-2xl bg-secondary/10 flex items-center justify-center mb-5 group-hover:bg-secondary group-hover:text-white transition-colors duration-300">
<span class="material-symbols-outlined text-secondary group-hover:text-white text-3xl" style="font-variation-settings: 'FILL' 1;">restaurant</span>
</div>
<span class="font-body text-sm font-extrabold text-on-surface text-left leading-tight">Adicionar<br/>Refeição</span>
</button>
<!-- Action 3: Atividade -->
<button class="flex flex-col items-start p-6 bg-white rounded-[2.5rem] action-card-shadow border border-white active:scale-[0.97] transition-all group">
<div class="w-14 h-14 rounded-2xl bg-tertiary-container/20 flex items-center justify-center mb-5 group-hover:bg-tertiary-fixed group-hover:text-white transition-colors duration-300">
<span class="material-symbols-outlined text-tertiary group-hover:text-white text-3xl" style="font-variation-settings: 'FILL' 1;">fitness_center</span>
</div>
<span class="font-body text-sm font-extrabold text-on-surface text-left leading-tight">Registrar<br/>Atividade</span>
</button>
<!-- Action 4: Medicação -->
<button class="flex flex-col items-start p-6 bg-white rounded-[2.5rem] action-card-shadow border border-white active:scale-[0.97] transition-all group">
<div class="w-14 h-14 rounded-2xl bg-red-50 flex items-center justify-center mb-5 group-hover:bg-error group-hover:text-white transition-colors duration-300">
<span class="material-symbols-outlined text-error group-hover:text-white text-3xl" style="font-variation-settings: 'FILL' 1;">medication</span>
</div>
<span class="font-body text-sm font-extrabold text-on-surface text-left leading-tight">Tomar<br/>Medicação</span>
</button>
</div>
</section>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-end px-6 pb-8 pt-3 bg-white/90 backdrop-blur-2xl z-50 shadow-[0_-8px_32px_rgba(0,0,0,0.05)] border-t border-slate-100 h-24">
<!-- Home -->
<a class="flex flex-col items-center justify-center text-primary pb-1" href="#">
<div class="w-12 h-8 flex items-center justify-center rounded-full bg-primary/10 mb-1">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">home</span>
</div>
<span class="font-body text-[10px] font-extrabold uppercase tracking-widest">Início</span>
</a>
<!-- Insights -->
<a class="flex flex-col items-center justify-center text-slate-400 pb-1 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined mb-1">insights</span>
<span class="font-body text-[10px] font-bold uppercase tracking-widest">Análise</span>
</a>
<!-- FAB Center -->
<div class="relative -top-10">
<button class="w-16 h-16 bg-primary rounded-2xl shadow-xl shadow-primary/30 flex items-center justify-center text-white active:scale-90 transition-all border-4 border-white">
<span class="material-symbols-outlined text-4xl">add</span>
</button>
</div>
<!-- Alertas -->
<a class="flex flex-col items-center justify-center text-slate-400 pb-1 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined mb-1">chat_bubble</span>
<span class="font-body text-[10px] font-bold uppercase tracking-widest">Dicas</span>
</a>
<!-- Perfil -->
<a class="flex flex-col items-center justify-center text-slate-400 pb-1 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined mb-1">person</span>
<span class="font-body text-[10px] font-bold uppercase tracking-widest">Perfil</span>
</a>
</nav>
</body></html>
