<body class="bg-surface text-on-surface selection:bg-primary-container selection:text-on-primary-container min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl fixed top-0 w-full z-50">
<div class="flex items-center justify-between px-6 h-16 w-full max-w-7xl mx-auto">
<button class="text-sky-700 dark:text-sky-400 p-2 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors rounded-full active:opacity-70 duration-200">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<span class="font-['Plus_Jakarta_Sans'] font-bold tracking-tight text-2xl font-black tracking-tighter text-sky-800 dark:text-sky-300">Glicare</span>
<div class="w-10"></div> <!-- Spacer for centering -->
</div>
</header>
<!-- Main Content -->
<main class="flex-grow flex flex-col items-center justify-center pt-24 pb-32 px-6">
<div class="w-full max-w-md">
<!-- Hero Header Section -->
<div class="text-center mb-10">
<h1 class="text-4xl font-extrabold text-primary mb-3 tracking-tight">Criar Conta</h1>
<p class="text-on-surface-variant text-lg">Junte-se ao santuário da sua saúde.</p>
</div>
<!-- Registration Card -->
<div class="bg-surface-container-lowest p-8 rounded-3xl shadow-[0_12px_32px_rgba(44,47,49,0.06)] relative overflow-hidden">
<!-- Subtle Gradient Accent -->
<div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-primary to-secondary"></div>
<form class="space-y-6">
<!-- Nome Completo -->
<div class="space-y-1.5">
<label class="block font-label text-sm font-semibold text-on-surface-variant ml-1">Nome Completo</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline" data-icon="person">person</span>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-low border-0 rounded-2xl focus:ring-2 focus:ring-primary/20 text-on-surface placeholder:text-outline transition-all duration-300" placeholder="Como devemos te chamar?" type="text"/>
</div>
</div>
<!-- E-mail -->
<div class="space-y-1.5">
<label class="block font-label text-sm font-semibold text-on-surface-variant ml-1">E-mail</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline" data-icon="mail">mail</span>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-low border-0 rounded-2xl focus:ring-2 focus:ring-primary/20 text-on-surface placeholder:text-outline transition-all duration-300" placeholder="seu@email.com" type="email"/>
</div>
</div>
<!-- Senha -->
<div class="space-y-1.5">
<label class="block font-label text-sm font-semibold text-on-surface-variant ml-1">Senha</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline" data-icon="lock">lock</span>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-low border-0 rounded-2xl focus:ring-2 focus:ring-primary/20 text-on-surface placeholder:text-outline transition-all duration-300" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Confirmar Senha -->
<div class="space-y-1.5">
<label class="block font-label text-sm font-semibold text-on-surface-variant ml-1">Confirmar Senha</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline" data-icon="lock_reset">lock_reset</span>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-low border-0 rounded-2xl focus:ring-2 focus:ring-primary/20 text-on-surface placeholder:text-outline transition-all duration-300" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Terms of Service -->
<div class="flex items-start gap-3 py-2 px-1">
<div class="flex items-center h-5">
<input class="w-5 h-5 text-primary border-outline-variant/30 bg-surface-container-low rounded-md focus:ring-primary" id="terms" type="checkbox"/>
</div>
<label class="text-sm text-on-surface-variant leading-tight cursor-pointer" for="terms">
                            Aceito os <span class="text-primary font-bold hover:underline">termos de uso</span> e <span class="text-primary font-bold hover:underline">política de privacidade</span>
</label>
</div>
<!-- Submit Button -->
<button class="w-full bg-gradient-to-r from-primary to-primary-dim text-on-primary font-bold py-4 rounded-full shadow-lg shadow-primary/20 hover:scale-[1.02] active:scale-95 transition-all duration-200" type="submit">
                        Criar Conta
                    </button>
</form>
</div>
<!-- Login Redirect -->
<div class="mt-10 text-center">
<a class="inline-flex items-center gap-2 group text-on-surface-variant font-medium" href="#">
                    Já tem uma conta? 
                    <span class="text-primary font-bold group-hover:underline transition-all">Entrar</span>
</a>
</div>
</div>
</main>
<!-- Side Visual (Hidden on mobile) -->
<div class="hidden lg:block fixed right-0 top-0 w-1/3 h-full overflow-hidden">
<div class="w-full h-full bg-surface-container-low flex flex-col items-center justify-center p-12">
<div class="relative w-full aspect-square max-w-md rounded-[3rem] overflow-hidden shadow-2xl">
<img class="w-full h-full object-cover" data-alt="A premium wellness setting featuring a high-tech medical device resting on a clean wooden table. Soft natural light flows through a window, illuminating a glass of pure water and a vibrant green plant. The aesthetic is clean, minimalist, and editorial, using a palette of soft blues, crisp whites, and natural textures to convey a sense of biological precision and calm sanctuary." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAjXqW3g67CifPkwSowB-K37mk0LJoCpa26SKXrwMve1NqK-qobwoL8yeQJbR1tIY1HeNCY7JsTqbwcsgHzAxf24yVbjNTwuAeuLOCldgpljeGW0U0X_sS1LqtEpepwI9UOpl6_CrYlGnH9352GwLL_yQ1OBc1YMuHmkvYU6mYx4p7ZfkxV52R8QkgCzPFhbvwceE83QfoneEOQ1U91zU7x9e-zt6_5a3KdHknrq3xQ-UG9H5tFjoHpA5Z8vhN97cA6WvHR3-Un"/>
<div class="absolute inset-0 bg-gradient-to-t from-primary/40 to-transparent"></div>
<div class="absolute bottom-8 left-8 right-8">
<p class="text-white text-2xl font-bold font-display leading-tight">Sua saúde com a precisão que você merece.</p>
</div>
</div>
</div>
</div>
<!-- BottomNavBar -->
<nav class="bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-6 pt-3 z-50 rounded-t-3xl shadow-[0_-4px_24px_rgba(0,0,0,0.04)] md:hidden">
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-6 py-2 hover:text-sky-600 dark:hover:text-sky-300 active:scale-95 duration-150" href="#">
<span class="material-symbols-outlined" data-icon="login">login</span>
<span class="font-['Manrope'] text-xs font-semibold">Login</span>
</a>
<a class="flex flex-col items-center justify-center bg-sky-100 dark:bg-sky-900/40 text-sky-800 dark:text-sky-100 rounded-full px-6 py-2 active:scale-95 duration-150" href="#">
<span class="material-symbols-outlined" data-icon="person_add" style="font-variation-settings: 'FILL' 1;">person_add</span>
<span class="font-['Manrope'] text-xs font-semibold">Sign Up</span>
</a>
</nav>
</body></html>
