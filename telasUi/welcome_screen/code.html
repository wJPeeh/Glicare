<!DOCTYPE html>

<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-tint": "#005f9c",
              "on-primary": "#ecf3ff",
              "background": "#f5f7f9",
              "surface-bright": "#f5f7f9",
              "tertiary-dim": "#714600",
              "on-secondary-fixed-variant": "#00675f",
              "primary": "#005f9c",
              "secondary-container": "#78f7e9",
              "on-background": "#2c2f31",
              "secondary-dim": "#005a53",
              "on-primary-container": "#002e50",
              "outline-variant": "#abadaf",
              "surface-container-highest": "#d9dde0",
              "secondary": "#00675f",
              "on-primary-fixed-variant": "#00375e",
              "primary-fixed-dim": "#4ea3f1",
              "primary-container": "#5eb0ff",
              "on-surface": "#2c2f31",
              "tertiary-fixed-dim": "#e79400",
              "on-error": "#ffefee",
              "on-error-container": "#570008",
              "on-tertiary-container": "#4a2c00",
              "surface": "#f5f7f9",
              "error-container": "#fb5151",
              "on-secondary-fixed": "#004842",
              "inverse-primary": "#5eb0ff",
              "on-tertiary-fixed-variant": "#563400",
              "outline": "#747779",
              "on-secondary": "#bffff6",
              "surface-variant": "#d9dde0",
              "secondary-fixed-dim": "#69e8db",
              "secondary-fixed": "#78f7e9",
              "inverse-on-surface": "#9a9d9f",
              "surface-dim": "#d0d5d8",
              "error-dim": "#9f0519",
              "inverse-surface": "#0b0f10",
              "on-primary-fixed": "#001123",
              "on-surface-variant": "#595c5e",
              "on-tertiary": "#fff0e3",
              "primary-fixed": "#5eb0ff",
              "tertiary": "#815100",
              "on-secondary-container": "#005c55",
              "surface-container-low": "#eef1f3",
              "tertiary-container": "#f8a010",
              "surface-container": "#e5e9eb",
              "on-tertiary-fixed": "#2a1700",
              "error": "#b31b25",
              "tertiary-fixed": "#f8a010",
              "primary-dim": "#005389",
              "surface-container-lowest": "#ffffff",
              "surface-container-high": "#dfe3e6"
            },
            fontFamily: {
              "headline": ["Plus Jakarta Sans"],
              "body": ["Manrope"],
              "label": ["Manrope"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-primary text-on-primary font-body antialiased min-h-screen flex flex-col selection:bg-secondary-container selection:text-on-secondary-container">
<!-- Top Branding Section -->
<header class="flex flex-col items-center pt-24 pb-12 px-8">
<div class="mb-6 relative">
<!-- Glicare Logo: Drop with checkmark -->
<div class="w-20 h-20 bg-white rounded-[2rem] flex items-center justify-center shadow-2xl rotate-3">
<span class="material-symbols-outlined text-primary text-5xl" style="font-variation-settings: 'FILL' 1;">water_drop</span>
<span class="material-symbols-outlined text-secondary absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-2xl font-bold">check</span>
</div>
</div>
<h1 class="font-headline font-black text-4xl tracking-tighter text-white mb-2">Glicare</h1>
<div class="h-1 w-12 bg-secondary rounded-full"></div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col px-8 pb-12">
<!-- Greeting Section -->
<div class="mt-8 mb-16 space-y-4">
<h2 class="font-headline font-bold text-3xl leading-tight text-white">
                Bem-vinda, Lilian!
            </h2>
<p class="text-on-primary/80 text-lg font-medium max-w-[280px] leading-relaxed">
                Vamos cuidar da sua saúde hoje ❤️
            </p>
</div>
<!-- Action Area (Bento-style layout for auth) -->
<div class="space-y-4 w-full max-w-md mx-auto">
<!-- Login Button -->
<button class="w-full h-16 bg-white text-primary font-headline font-bold text-lg rounded-full shadow-lg shadow-black/10 flex items-center justify-center gap-3 active:scale-95 transition-transform">
                Entrar
                <span class="material-symbols-outlined">arrow_forward</span>
</button>
<!-- Create Account Button -->
<button class="w-full h-16 glass-panel border border-white/10 text-white font-headline font-semibold text-lg rounded-full flex items-center justify-center active:scale-95 transition-transform">
                Criar nova conta
            </button>
</div>
<!-- Spacer for push-down -->
<div class="flex-grow"></div>
<!-- Decorative Health Metric (Ambient Background Pattern Replacement) -->
<div class="absolute right-0 top-1/3 opacity-10 pointer-events-none overflow-hidden translate-x-1/4">
<span class="material-symbols-outlined text-[300px]" style="font-variation-settings: 'wght' 100;">monitoring</span>
</div>
<!-- Footer / External Auth -->
<div class="mt-12 flex flex-col items-center gap-6">
<div class="flex items-center gap-4 w-full max-w-xs">
<div class="h-[1px] flex-grow bg-white/20"></div>
<span class="text-white/40 font-label text-xs uppercase tracking-[0.2em]">ou</span>
<div class="h-[1px] flex-grow bg-white/20"></div>
</div>
<!-- SUS Authentication Link -->
<button class="flex items-center gap-3 px-6 py-4 rounded-2xl bg-surface-container-lowest/5 hover:bg-surface-container-lowest/10 transition-colors border border-white/5 active:scale-95 transition-transform">
<div class="w-8 h-8 rounded-full bg-[#0078d7] flex items-center justify-center text-[10px] font-bold text-white">SUS</div>
<span class="font-body font-medium text-white/90">Fazer login com SUS</span>
</button>
<p class="text-white/40 text-[10px] text-center max-w-[240px] leading-relaxed px-4">
                Ao continuar, você concorda com nossos termos de privacidade e uso de dados de saúde.
            </p>
</div>
</main>
<!-- Visual Polish: Soft Ambient Glows -->
<div class="fixed top-[-10%] left-[-10%] w-[50%] h-[40%] bg-secondary/20 blur-[120px] rounded-full pointer-events-none"></div>
<div class="fixed bottom-[-5%] right-[-5%] w-[40%] h-[30%] bg-primary-container/10 blur-[100px] rounded-full pointer-events-none"></div>
</body></html>
