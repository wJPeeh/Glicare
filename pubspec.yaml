name: glicare
description: "Um aplicativo Flutter."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.2
  flutter_riverpod: ^3.3.1
  go_router: ^17.2.3
  intl: ^0.20.2
  google_fonts: ^8.1.0
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  firebase_messaging: ^16.2.0
  firebase_crashlytics: ^5.2.0
  firebase_analytics: ^12.3.0
  google_sign_in: ^6.2.1
  flutter_facebook_auth: ^7.1.1
  firebase_database: ^12.4.0
  fl_chart: ^0.69.0
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  image_picker: ^1.2.2
  firebase_storage: ^13.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  integration_test:
    sdk: flutter

  firebase_auth_mocks: ^0.15.2

  flutter_lints: ^3.0.0
  flutter_native_splash: ^2.4.4

flutter:
  uses-material-design: true

# Splash nativo (antes do motor do Flutter subir). Gera os arquivos de
# Android/iOS automaticamente. Para regerar após mudar algo:
#   dart run flutter_native_splash:create
flutter_native_splash:
  color: "#005F9C"
  image: assets/splash/glicare_logo.png
  android_12:
    color: "#005F9C"
    image: assets/splash/glicare_logo_android12.png
  android: true
  ios: true
  web: false
